backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "course"
    label: "Course Lessons"
    folder: "src/content/course"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Module", name: "module", widget: "string", default: "Getting Started" }
      - { label: "Order", name: "order", widget: "number" }
      - { label: "Video URL", name: "videoUrl", widget: "string", required: false }
      - { label: "Free Preview", name: "freePreview", widget: "boolean", default: false }
      - { label: "Lesson Content", name: "body", widget: "markdown" }
